version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - agentic-net

  app:
    build: .
    container_name: crewai-app
    restart: unless-stopped
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - agentic-net
    depends_on: []

networks:
  agentic-net:
    driver: bridge

volumes:
  jenkins_home:
